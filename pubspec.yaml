name: finovo
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^0.68.0
  intl: ^0.19.0
  flutter_svg: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/icons/

fonts:
  - family: Inter
    fonts:
      - asset: assets/fonts/Inter_18pt-Regular.ttf

      - asset: assets/fonts/Inter_18pt-Medium.ttf
        weight: 500

      - asset: assets/fonts/Inter_18pt-SemiBold.ttf
        weight: 600

      - asset: assets/fonts/Inter_18pt-Bold.ttf
        weight: 700

        fl_chart: ^0.68.0